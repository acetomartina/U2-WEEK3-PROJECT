<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomePage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">CRUDazon</a>
          <a
            class="btn btn-outline-light rounded-pill px-4"
            href="./backoffice.html"
          >
            Backoffice
          </a>
        </div>
      </nav>

      <div class="hero-section container py-5">
        <div class="row align-items-center">
          <div class="col-12 col-lg-7">
            <p class="text-uppercase small fw-semibold mb-2">
              Cozy shop collection
            </p>

            <h1 class="display-4 fw-bold mb-3">
              Candele profumate per rendere ogni stanza più tua.
            </h1>

            <p class="lead text-muted mb-4">
              Una selezione minimal, calda e raffinata di fragranze per casa.
            </p>

            <a href="#products" class="btn btn-primary px-4 py-2">
              Scopri i prodotti
            </a>
          </div>

          <div class="col-12 col-lg-5 mt-5 mt-lg-0">
            <div class="hero-card p-4">
              <img
                src="https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&w=900&q=80"
                alt="Candela profumata"
                class="img-fluid rounded-4"
              />
            </div>
          </div>
        </div>
      </div>
    </header>
    <main id="products" class="container py-5">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <p class="text-uppercase small fw-semibold text-muted mb-1">
            Our products
          </p>
          <h2 class="fw-bold mb-0">Collezione candele</h2>
        </div>
        <div id="loader" class="spinner-border d-none" role="status">
          <span class="visually-hidden">Caricamento...</span>
        </div>
      </div>
      <div id="products-row" class="row g-4"></div>
    </main>
    <footer class="py-4 mt-5">
      <div class="container text-center">
        <p class="mb-0 small">CRUDazon — aesthetic candle shop</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/script/index.js"></script>
  </body>
</html>
