<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BackOffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body class="bg-light">
    <header>
      <nav class="navbar navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="./index.html">CRUDazon</a>
          <a class="btn btn-outline-light" href="./index.html">Homepage</a>
        </div>
      </nav>
    </header>

    <main class="container py-5">
      <h1 class="mb-4">Backoffice prodotti</h1>

      <form id="product-form" class="bg-white p-4 rounded shadow-sm">
        <div class="mb-3">
          <label for="name" class="form-label">Nome prodotto</label>
          <input id="name" type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Descrizione</label>
          <textarea id="description" class="form-control"></textarea>
        </div>

        <div class="mb-3">
          <label for="brand" class="form-label">Brand</label>
          <input id="brand" type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label for="imageUrl" class="form-label">URL immagine</label>
          <input id="imageUrl" type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label for="price" class="form-label">Prezzo</label>
          <input id="price" type="number" class="form-control" />
        </div>

        <button type="submit" class="btn btn-primary">Salva prodotto</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
      </form>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/script/backoffice.js"></script>
  </body>
</html>
