<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BackOffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body class="bg-light">
    <header>
      <nav class="navbar navbar-dark">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">CRUDazon</a>
          <a
            class="btn btn-outline-light rounded-pill px-4"
            href="./index.html"
          >
            Homepage
          </a>
        </div>
      </nav>
      <div class="py-5 backoffice-hero container text-center">
        <p class="text-uppercase small fw-semibold mb-2">Admin panel</p>
        <h1 class="fw-bold">Gestione prodotti</h1>
        <p class="text-muted">Aggiungi, modifica o elimina le tue candele</p>
      </div>
    </header>

    <main class="container pb-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <form id="product-form" class="form-card p-4 p-md-5">
            <h3 class="mb-4 fw-bold">Dettagli prodotto</h3>

            <div class="mb-3">
              <label class="form-label">Nome prodotto</label>
              <input
                id="name"
                type="text"
                class="form-control"
                placeholder="Vanilla Moon"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Descrizione</label>
              <textarea
                id="description"
                class="form-control"
                rows="3"
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Brand</label>
              <input
                id="brand"
                type="text"
                class="form-control"
                placeholder="Luna Atelier"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">URL immagine</label>
              <input id="imageUrl" type="text" class="form-control" />
            </div>

            <div class="mb-4">
              <label class="form-label">Prezzo (€)</label>
              <input id="price" type="number" class="form-control" />
            </div>

            <div class="d-flex flex-wrap gap-2">
              <button type="submit" class="btn btn-primary px-4">
                Salva prodotto
              </button>

              <button
                id="reset-button"
                type="reset"
                class="btn btn-outline-secondary px-4"
              >
                Reset
              </button>

              <button
                id="delete-button"
                type="button"
                class="btn btn-danger px-4 d-none ms-auto"
              >
                Elimina
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/script/backoffice.js"></script>
  </body>
</html>
